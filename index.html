<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Today">
<title>Today</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ══ TOKENS ══ */
:root {
  --bg:       #0d0f14;
  --surface:  #151820;
  --surface2: #1c2030;
  --border:   #252a38;
  --text:     #e8ecf4;
  --text-sub: #7a8299;
  --text-dim: #3d4458;
  --accent:   #4a9eff;
  --accent2:  #7ec8ff;
  --warn:     #ff9f43;
  --danger:   #ff6b6b;
  --good:     #26de81;
  --runway:   linear-gradient(90deg,transparent 0%,#4a9eff33 20%,#4a9eff 50%,#4a9eff33 80%,transparent 100%);
}
@media (prefers-color-scheme: light) {
  :root {
    --bg:#f0f2f7; --surface:#fff; --surface2:#f5f7fc; --border:#dde1ec;
    --text:#1a1f2e; --text-sub:#5a637a; --text-dim:#b0b8cc;
    --accent:#1a6fd4; --accent2:#2a7fe4; --warn:#e07b00; --danger:#d63031; --good:#00b894;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;
  font-family:-apple-system,'SF Pro Display','Hiragino Sans',sans-serif;
  background:var(--bg); color:var(--text);
  overflow-x:hidden; user-select:none; -webkit-user-select:none;
}
body{
  display:flex; flex-direction:column; min-height:100vh;
  padding:env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,0);
}

/* ── HEADER ── */
.header{
  padding:18px 22px 0;
  display:flex; justify-content:space-between; align-items:center;
}
.clock{font-size:42px;font-weight:200;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums;}
.date-line{font-size:13px;color:var(--text-sub);margin-top:3px;}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.weather-temp-big{font-size:42px;font-weight:200;line-height:1;letter-spacing:-1px;}
.weather-loc-label{font-size:11px;color:var(--accent2);text-align:right;font-weight:500;}
.weather-desc{font-size:12px;color:var(--text-sub);text-align:right;}

/* ── RUNWAY ── */
.runway{
  height:1px; background:var(--runway); margin:12px 0 8px; position:relative;
}
.runway::before,.runway::after{
  content:'▶'; position:absolute; top:-7px; font-size:10px; color:var(--accent); opacity:0.5;
}
.runway::before{left:22px;} .runway::after{right:22px;transform:rotate(180deg);}

/* ── GRID ── */
.grid-area{flex:1;padding:6px 10px 20px;}
.columns{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start;}
.widget{flex:0 0 calc(50% - 6px);min-width:220px;}
@media(max-width:600px){.widget{flex:0 0 100%!important;}}

/* ── WIDGET ── */
.widget{position:relative;cursor:default;touch-action:pan-y;}
.widget.dragging{opacity:0.4;}
.widget.drag-over-left{border-left:3px solid var(--accent);border-radius:3px 0 0 3px;}
.widget.drag-over-right{border-right:3px solid var(--accent);border-radius:0 3px 3px 0;}

/* ── CARD ── */
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
.card-header{
  display:flex;align-items:center;gap:6px;
  padding:11px 15px 9px;border-bottom:1px solid var(--border);
  cursor:grab;
}
.card-header:active{cursor:grabbing;}
.drag-handle{color:var(--text-dim);font-size:13px;padding-right:4px;cursor:grab;}
.card-icon{font-size:14px;opacity:0.8;}
.card-title{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-sub);}

/* ── LOCATION PICKER ── */
.loc-row{
  display:flex;gap:5px;align-items:center;
  padding:7px 15px;border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.loc-btn{
  padding:3px 11px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-sub);
  font-size:11px;cursor:pointer;white-space:nowrap;
  transition:background 0.15s,color 0.15s,border-color 0.15s;
}
.loc-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.loc-btn:active{opacity:0.7;}
.loc-custom-wrap{border-bottom:1px solid var(--border);}
.loc-custom-row{display:flex;gap:6px;padding:8px 15px;}
.loc-input{
  flex:1;padding:7px 10px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:12px;outline:none;-webkit-appearance:none;
  user-select:text;-webkit-user-select:text;
}
.loc-input:focus{border-color:var(--accent);}
.loc-input::placeholder{color:var(--text-dim);}
.loc-search-btn{
  padding:7px 12px;border-radius:8px;background:var(--accent);
  color:#fff;font-size:12px;border:none;cursor:pointer;
}
.loc-search-btn:active{opacity:0.8;}
.loc-results{max-height:140px;overflow-y:auto;padding:4px 15px;}
.loc-result-item{
  padding:8px 0;border-bottom:1px solid var(--border);
  font-size:12px;cursor:pointer;color:var(--text-sub);line-height:1.3;
}
.loc-result-item:last-child{border-bottom:none;}
.loc-result-item:active{color:var(--accent);}

/* ── WEATHER BODY ── */
.weather-body{padding:11px 15px;}
.weather-hourly{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.weather-hourly::-webkit-scrollbar{display:none;}
.hour-slot{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:48px;padding:0 2px;}
.hour-label{font-size:10px;color:var(--text-sub);font-variant-numeric:tabular-nums;}
.hour-icon{font-size:17px;}
.hour-temp{font-size:12px;font-weight:500;}
.hour-rain{font-size:10px;color:var(--accent2);min-height:13px;}
.weather-summary{margin-top:9px;display:flex;gap:8px;padding-top:9px;border-top:1px solid var(--border);flex-wrap:wrap;}
.weather-stat{display:flex;flex-direction:column;gap:1px;flex:1;min-width:50px;}
.weather-stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.07em;}
.weather-stat-val{font-size:14px;font-weight:500;}

/* ── CALENDAR HEADER CONTROLS ── */
.cal-nav{display:flex;align-items:center;gap:3px;margin-left:auto;}
.cal-nav-btn{
  width:22px;height:22px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-sub);
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.cal-nav-btn:active{background:var(--accent);border-color:var(--accent);color:#fff;}
.cal-date-label{
  font-size:11px;color:var(--text);white-space:nowrap;cursor:pointer;
  padding:2px 5px;border-radius:5px;
}
.cal-date-label.is-today{color:var(--accent);font-weight:600;}
.cal-date-label:active{background:var(--surface2);}
.cal-settings-btn{
  width:22px;height:22px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-sub);
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  margin-left:4px;flex-shrink:0;
}
.cal-settings-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.cal-refresh{font-size:10px;color:var(--text-dim);margin-left:2px;}

/* ── CALENDAR SETTINGS PANEL ── */
.cal-settings-panel{
  display:none;padding:8px 15px;border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.cal-settings-panel.open{display:block;}
.cal-check-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;
}
.cal-check-row:last-child{border-bottom:none;}
.cal-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cal-check-label{font-size:12px;flex:1;color:var(--text);}
.cal-checkbox{width:14px;height:14px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;}

/* ── SCHEDULE ── */
.schedule-body{padding:5px 0;}
.event-row{display:flex;align-items:flex-start;padding:8px 15px;gap:11px;}
.event-time{font-size:11px;color:var(--text-sub);font-variant-numeric:tabular-nums;white-space:nowrap;padding-top:2px;min-width:46px;}
.event-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0;}
.event-dot.flight{background:var(--warn);}
.event-dot.allday{background:var(--text-dim);}
.event-info{flex:1;}
.event-title{font-size:14px;font-weight:500;line-height:1.3;}
.event-location{font-size:11px;color:var(--text-sub);margin-top:1px;}
.event-badge{font-size:9px;padding:2px 6px;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;white-space:nowrap;align-self:center;}
.event-badge.flight{background:#ff6b2b;}
.no-events{padding:16px 15px;color:var(--text-dim);font-size:13px;text-align:center;}
.loading-text{padding:16px 15px;color:var(--text-sub);font-size:12px;text-align:center;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* ── GCAL SETUP ── */
.gcal-setup{padding:14px 15px 16px;}
.gcal-setup p{font-size:12px;color:var(--text-sub);margin-bottom:10px;line-height:1.5;}
.gcal-input-row{display:flex;gap:8px;align-items:stretch;}
.gcal-input{
  flex:1;padding:9px 12px;border-radius:9px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:13px;outline:none;-webkit-appearance:none;
  user-select:text;-webkit-user-select:text;
}
.gcal-input:focus{border-color:var(--accent);}
.gcal-input::placeholder{color:var(--text-dim);}
.gcal-save-btn{
  padding:9px 14px;border-radius:9px;background:var(--accent);color:#fff;
  font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;
}
.gcal-save-btn:active{opacity:0.8;}
.gcal-signin-btn{
  display:block;margin-top:10px;padding:10px;border-radius:9px;
  background:var(--accent);color:#fff;
  text-align:center;font-size:13px;font-weight:600;cursor:pointer;border:none;width:100%;
}
.gcal-signin-btn:active{opacity:0.8;}
.gcal-id-hint{margin-top:8px;font-size:11px;color:var(--text-dim);line-height:1.5;}

/* ── TRANSPORT ── */
.transport-body{padding:6px 0;}
.transport-row{display:flex;align-items:center;padding:8px 15px;gap:10px;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);}
.transport-row:last-child{border-bottom:none;}
.transport-icon{font-size:17px;width:26px;text-align:center;}
.transport-info{flex:1;}
.transport-name{font-size:13px;font-weight:500;}
.transport-sub{font-size:11px;color:var(--text-sub);margin-top:1px;}
.transport-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;}
.status-check{background:#4a9eff22;color:var(--accent);}

/* ── RADAR ── */
.radar-body{position:relative;}
.radar-container{position:relative;width:100%;height:300px;}
#radarMap{width:100%;height:100%;}
.leaflet-control-attribution{font-size:8px!important;background:rgba(255,255,255,0.7)!important;color:rgba(0,0,0,0.5)!important;}
.leaflet-control-attribution a{color:rgba(0,0,0,0.4)!important;}
.radar-float-btns{position:absolute;bottom:8px;left:8px;display:flex;gap:5px;z-index:1000;flex-wrap:wrap;}
.radar-float-btn{
  display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:16px;
  background:rgba(13,15,20,0.80);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.12);text-decoration:none;color:#e8ecf4;
  font-size:11px;font-weight:500;white-space:nowrap;
}
.radar-float-btn:active{background:rgba(74,158,255,0.4);}
.radar-time-pill{
  position:absolute;top:8px;right:8px;z-index:1000;
  font-size:10px;color:rgba(255,255,255,0.7);
  background:rgba(0,0,0,0.55);padding:2px 7px;border-radius:8px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.radar-legend{
  position:absolute;top:8px;left:8px;z-index:1000;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  border-radius:7px;padding:5px 7px;display:flex;flex-direction:column;gap:2px;
}
.legend-row{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,0.7);}
.legend-swatch{width:14px;height:7px;border-radius:2px;}



/* ── CARD RESIZE HANDLE ── */
.widget{position:relative;}
.card-resize-handle{
  position:absolute;bottom:0;left:0;right:0;height:10px;
  cursor:s-resize;z-index:5;
}
.card-resize-handle::after{
  content:'';position:absolute;bottom:0;left:5%;right:5%;
  height:2px;background:var(--border);border-radius:1px;
  transition:background 0.15s;
}
.card-resize-handle:hover::after,.card-resize-handle.resizing::after{background:var(--accent);}
/* 全画面スタイル */
/* CSS全画面モード（ブラウザ内） */
.widget-fullscreen{
  position:fixed!important;inset:0!important;
  width:100%!important;height:100vh!important;min-height:0!important;
  z-index:9000!important;border-radius:0!important;
}
.widget-fullscreen>.card{
  height:100vh!important;border-radius:0!important;
  display:flex!important;flex-direction:column!important;overflow:hidden!important;
}
.widget-fullscreen .radar-body{flex:1!important;min-height:0!important;}
.widget-fullscreen .radar-container{height:100%!important;}
.widget-fullscreen #radarMap{height:100%!important;}


/* ── CARD SIDE RESIZE HANDLE ── */
.card-resize-h{
  position:absolute;top:15%;bottom:15%;width:10px;cursor:ew-resize;z-index:6;
}
.card-resize-h.right{right:-5px;}
.card-resize-h.left{left:-5px;}
.card-resize-h::after{
  content:'';position:absolute;top:0;bottom:0;left:4px;
  width:2px;background:var(--border);border-radius:1px;
  transition:background 0.15s;
}
.card-resize-h:hover::after,.card-resize-h.resizing::after{background:var(--accent);}

/* ── COL RESIZER ── */
.col-resizer{
  width:16px;cursor:col-resize;position:relative;flex-shrink:0;
}
.col-resizer::after{
  content:'';position:absolute;left:7px;top:24px;bottom:24px;
  width:2px;background:var(--border);border-radius:1px;
  transition:background 0.15s;
}
.col-resizer:hover::after,.col-resizer.resizing::after{background:var(--accent);}
@media(max-width:600px){.col-resizer{display:none;}}

/* ── MAP STYLE SELECTOR ── */
.map-style-row{
  display:flex;gap:5px;padding:6px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.map-style-btn{
  padding:2px 10px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-sub);
  font-size:11px;cursor:pointer;white-space:nowrap;
  transition:background 0.15s,color 0.15s;
}
.map-style-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.map-style-btn:active{opacity:0.7;}

/* ── SPINNER ── */
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── FOOTER ── */
.footer{text-align:center;padding:5px 14px 14px;font-size:10px;color:var(--text-dim);cursor:pointer;line-height:1.6;}

/* ── TRAIN STATUS ── */
.train-settings-panel{display:none;padding:8px 15px;border-bottom:1px solid var(--border);background:var(--surface2);}
.train-settings-panel.open{display:block;}
.train-line-grid{display:flex;flex-wrap:wrap;gap:5px;padding:4px 0;}
.train-line-chip{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text-sub);font-size:11px;cursor:pointer;transition:background 0.15s,color 0.15s;}
.train-line-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.train-row{display:flex;align-items:center;padding:7px 15px;gap:10px;border-bottom:1px solid var(--border);}
.train-row:last-child{border-bottom:none;}
.train-name{font-size:13px;flex:1;}
.train-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;white-space:nowrap;}
.badge-ok{background:#26de8122;color:var(--good);}
.badge-delay{background:#ff6b6b22;color:var(--danger);}
.train-src{font-size:9px;color:var(--text-dim);margin-top:2px;}

/* ── YCAT BUS ── */
.bus-row{display:flex;align-items:center;padding:7px 15px;gap:8px;border-bottom:1px solid var(--border);}
.bus-row:last-child{border-bottom:none;}
.bus-time{font-size:16px;font-weight:500;font-variant-numeric:tabular-nums;min-width:50px;}
.bus-until{font-size:11px;color:var(--accent);font-weight:600;min-width:65px;text-align:right;}
.bus-next-label{font-size:9px;padding:2px 7px;border-radius:8px;background:var(--accent);color:#fff;font-weight:700;white-space:nowrap;}
.bus-hint{padding:5px 15px 9px;font-size:10px;color:var(--text-dim);line-height:1.6;}

/* ── TRAFFIC TIME ── */
.traffic-time-block{padding:12px 15px;}
.traffic-time-block+.traffic-time-block{border-top:1px solid var(--border);}
.traffic-route-label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-sub);margin-bottom:8px;flex-wrap:wrap;}
.traffic-route-label strong{color:var(--text);font-weight:500;}
.traffic-cells{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.traffic-cell{flex:1;background:var(--surface2);border-radius:9px;padding:7px 8px;text-align:center;}
.traffic-cell-label{font-size:9px;color:var(--text-dim);letter-spacing:0.05em;margin-bottom:3px;text-transform:uppercase;}
.traffic-cell-val{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1;}
.traffic-cell-unit{font-size:10px;font-weight:400;margin-left:1px;}
.traffic-status-icon{font-size:22px;flex-shrink:0;}
.traffic-maps-btn{display:block;text-align:center;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-sub);font-size:11px;text-decoration:none;}
.traffic-maps-btn:active{background:var(--accent);color:#fff;border-color:var(--accent);}
.traffic-footer{padding:6px 15px 10px;font-size:10px;color:var(--text-dim);border-top:1px solid var(--border);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="clock" id="clock">--:--</div>
    <div class="date-line" id="dateLabel">--</div>
  </div>
  <div class="header-right">
    <div class="weather-temp-big" id="headerTemp">--°</div>
    <div class="weather-loc-label" id="headerLoc">--</div>
    <div class="weather-desc" id="headerDesc">読込中…</div>
  </div>
</div>

<div class="runway"></div>

<!-- COLUMN GRID -->
<div class="grid-area">
  <div class="columns" id="columnsRoot">

    <!-- 天気ウィジェット -->
      <div class="widget" id="w-weather" draggable="true">
        <div class="card">
          <div class="card-header">
            <span class="drag-handle">⠿</span>
            <span class="card-icon">🌤</span>
            <span class="card-title">天気予報</span>
            <div class="cal-nav">
              <button class="cal-nav-btn" onclick="weatherNav(-1)" title="前の日">◀</button>
              <span class="cal-date-label" id="weatherDateLabel" onclick="weatherNavToday()">--</span>
              <button class="cal-nav-btn" onclick="weatherNav(1)" title="次の日">▶</button>
              <button class="cal-nav-btn" onclick="weatherNavToday()" title="今日" style="width:auto;padding:0 7px;font-size:10px;font-weight:600;">今日</button>
            </div>
          </div>
          <!-- ロケーション選択 -->
          <div class="loc-row" id="locRow">
            <button class="loc-btn" id="locBtn0" onclick="setLocation(0)">逗子</button>
            <button class="loc-btn" id="locBtn1" onclick="setLocation(1)">羽田</button>
            <button class="loc-btn" id="locBtn2" onclick="setLocation(2)">横浜</button>
            <button class="loc-btn" id="locBtnCustom" onclick="toggleCustomLoc()">📍 その他</button>
          </div>
          <div class="loc-custom-wrap" id="customLocWrap" style="display:none">
            <div class="loc-custom-row">
              <input class="loc-input" id="locSearchInput" type="text" placeholder="地名を入力…">
              <button class="loc-search-btn" onclick="searchLocation()">検索</button>

<script>
'use strict';

/* ══ CLOCK ══ */
const WDAYS=['日','月','火','水','木','金','土'];
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('dateLabel').textContent=
    `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日（${WDAYS[n.getDay()]}）`;
}
updateClock(); setInterval(updateClock,15000);
function fmtTime(d){return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

/* ══════════════════════════════════════
   LOCATION
══════════════════════════════════════ */
const PRESETS=[
  {name:'逗子市', lat:35.2942, lon:139.5779},
  {name:'羽田空港', lat:35.5494, lon:139.7798},
  {name:'横浜', lat:35.4437, lon:139.6380},
];
const LOC_KEY='weather_location_v2';

function getSavedLoc(){
  try{
    const s=localStorage.getItem(LOC_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return {...PRESETS[2], presetIdx:2};
}
let currentLoc=getSavedLoc();

function updateLocUI(){
  PRESETS.forEach((_,i)=>{
    const btn=document.getElementById(`locBtn${i}`);
    if(btn) btn.classList.toggle('active', currentLoc.presetIdx===i);
  });
  const customBtn=document.getElementById('locBtnCustom');
  if(customBtn) customBtn.classList.toggle('active', currentLoc.presetIdx===-1);
  document.getElementById('headerLoc').textContent=currentLoc.name;
}

function setLocation(idx){
  currentLoc={...PRESETS[idx], presetIdx:idx};
  localStorage.setItem(LOC_KEY, JSON.stringify(currentLoc));
  document.getElementById('customLocWrap').style.display='none';
  updateLocUI();
  loadWeather();
}

function toggleCustomLoc(){
  const wrap=document.getElementById('customLocWrap');
  const isOpen=wrap.style.display==='none';
  wrap.style.display=isOpen?'block':'none';
  if(isOpen) document.getElementById('locSearchInput').focus();
}

let locSearchResults=[];
async function searchLocation(){
  const q=(document.getElementById('locSearchInput').value||'').trim();
  if(!q) return;
  const res=document.getElementById('locResults');
  res.innerHTML=`<div class="loading-text" style="padding:8px 0"><span class="spinner"></span> 検索中…</div>`;
  try{
    const r=await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=ja&format=json`
    );
    const d=await r.json();
    locSearchResults=d.results||[];
    if(!locSearchResults.length){
      res.innerHTML=`<div class="loc-result-item">見つかりませんでした</div>`;
      return;
    }
    res.innerHTML=locSearchResults.map((p,i)=>{
      const label=[p.name, p.admin1, p.country].filter(Boolean).join(', ');
      return`<div class="loc-result-item" data-idx="${i}">📍 ${label}</div>`;
    }).join('');
    res.querySelectorAll('.loc-result-item').forEach(el=>{
      el.addEventListener('click',()=>pickCustomLoc(Number(el.dataset.idx)));
    });
  }catch(e){
    res.innerHTML=`<div class="loc-result-item">検索エラー</div>`;
  }
}

function pickCustomLoc(idx){
  const p=locSearchResults[idx];
  if(!p) return;
  const label=[p.name, p.admin1].filter(Boolean).join(', ');
  currentLoc={name:label, lat:p.latitude, lon:p.longitude, presetIdx:-1};
  localStorage.setItem(LOC_KEY, JSON.stringify(currentLoc));
  document.getElementById('customLocWrap').style.display='none';
  document.getElementById('locResults').innerHTML='';
  document.getElementById('locSearchInput').value='';
  updateLocUI();
  loadWeather();
}

/* ══════════════════════════════════════
   GOOGLE CALENDAR
══════════════════════════════════════ */
const GCAL_CLIENT_KEY='gcal_client_id';
const GCAL_TOKEN_KEY ='gcal_token';
const GCAL_EXPIRY_KEY='gcal_expiry';
const GCAL_SCOPES    ='https://www.googleapis.com/auth/calendar.readonly';
const CAL_SEL_KEY    ='gcal_selected_cals_v2';

function gcalClientId(){return localStorage.getItem(GCAL_CLIENT_KEY)||'';}
function gcalGetToken(){
  const exp=localStorage.getItem(GCAL_EXPIRY_KEY);
  if(exp&&Date.now()<Number(exp)) return localStorage.getItem(GCAL_TOKEN_KEY);
  return null;
}
function gcalSaveToken(tok,sec){
  localStorage.setItem(GCAL_TOKEN_KEY,tok);
  localStorage.setItem(GCAL_EXPIRY_KEY,String(Date.now()+sec*1000-60000));
}
function gcalSignIn(){
  const cid=gcalClientId();
  if(!cid){showSetupUI();return;}
  const redirect=location.origin+location.pathname;
  location.href='https://accounts.google.com/o/oauth2/v2/auth'
    +`?client_id=${encodeURIComponent(cid)}`
    +`&redirect_uri=${encodeURIComponent(redirect)}`
    +'&response_type=token'
    +`&scope=${encodeURIComponent(GCAL_SCOPES)}`
    +'&prompt=consent';
}
function gcalHandleRedirect(){
  if(!location.hash) return false;
  const p=new URLSearchParams(location.hash.slice(1));
  const tok=p.get('access_token');
  if(tok){
    gcalSaveToken(tok,Number(p.get('expires_in'))||3600);
    history.replaceState(null,'',location.pathname);
    return true;
  }
  return false;
}

/* ── Date navigation ── */
let calDisplayDate=new Date(); calDisplayDate.setHours(0,0,0,0);
let weatherDisplayDate=new Date(); weatherDisplayDate.setHours(0,0,0,0);

function weatherNav(delta){
  const today=new Date();today.setHours(0,0,0,0);
  const next=new Date(weatherDisplayDate.getTime()+delta*86400000);
  const diff=Math.round((next-today)/86400000);
  if(diff<-1||diff>6) return;
  weatherDisplayDate=next;
  updateWeatherDateLabel();
  loadWeather();
}
function weatherNavToday(){
  const today=new Date();today.setHours(0,0,0,0);
  if(weatherDisplayDate.getTime()===today.getTime()) return;
  weatherDisplayDate=today;
  updateWeatherDateLabel();
  loadWeather();
}
function updateWeatherDateLabel(){
  const el=document.getElementById('weatherDateLabel');
  if(!el) return;
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((weatherDisplayDate-today)/86400000);
  const m=weatherDisplayDate.getMonth()+1, d=weatherDisplayDate.getDate();
  let text=`${m}/${d}`;
  if(diff===0) text+=' 今日';
  else if(diff===1) text+=' 明日';
  else if(diff===-1) text+=' 昨日';
  el.textContent=text;
  el.className='cal-date-label'+(diff===0?' is-today':'');
}

function calNav(delta){
  calDisplayDate=new Date(calDisplayDate.getTime()+delta*86400000);
  updateCalDateLabel();
  loadCalendar();
}
function calNavToday(){
  const today=new Date(); today.setHours(0,0,0,0);
  if(calDisplayDate.getTime()===today.getTime()) return;
  calDisplayDate=today;
  updateCalDateLabel();
  loadCalendar();
}
function updateCalDateLabel(){
  const n=calDisplayDate;
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((calDisplayDate-today)/86400000);
  const label=document.getElementById('calDateLabel');
  let text=`${n.getMonth()+1}/${n.getDate()}(${WDAYS[n.getDay()]})`;
  if(diff===0) text+=' 今日';
  else if(diff===1) text+=' 明日';
  else if(diff===-1) text+=' 昨日';
  label.textContent=text;
  label.classList.toggle('is-today', diff===0);
}

/* ── Calendar selector ── */
let calCalendarsCache=null;
let calEventsCache=[];

function getSelectedCalIds(){
  const s=localStorage.getItem(CAL_SEL_KEY);
  if(!s) return null; // null = すべて表示
  try{return new Set(JSON.parse(s));}catch(e){return null;}
}
function saveSelectedCalIds(ids){
  localStorage.setItem(CAL_SEL_KEY, JSON.stringify([...ids]));
}

function renderCalSettingsPanel(calendars){
  if(!calendars||!calendars.length) return;
  const selectedIds=getSelectedCalIds();
  const panel=document.getElementById('calSettingsPanel');
  panel.innerHTML=calendars.map(cal=>{
    const checked=!selectedIds||selectedIds.has(cal.id);
    const color=cal.backgroundColor||'#4a9eff';
    return`<label class="cal-check-row">
      <input type="checkbox" class="cal-checkbox" data-calid="${cal.id}" ${checked?'checked':''}>
      <span class="cal-color-dot" style="background:${color}"></span>
      <span class="cal-check-label">${cal.summary||cal.id}</span>
    </label>`;
  }).join('');
  panel.querySelectorAll('.cal-checkbox').forEach(cb=>{
    cb.addEventListener('change',()=>{
      const checked=new Set(
        [...panel.querySelectorAll('.cal-checkbox:checked')].map(el=>el.dataset.calid)
      );
      saveSelectedCalIds(checked);
      renderEvents(filterEvents(calEventsCache, checked));
    });
  });
}

function toggleCalSettings(){
  const panel=document.getElementById('calSettingsPanel');
  const btn=document.getElementById('calSettingsBtn');
  const open=panel.classList.toggle('open');
  btn.classList.toggle('active',open);
  if(open&&calCalendarsCache) renderCalSettingsPanel(calCalendarsCache);
}

function filterEvents(events, selectedIds){
  if(!selectedIds) return events;
  return events.filter(ev=>selectedIds.has(ev.calId));
}

/* ── Setup UI ── */
function showSetupUI(msg){
  const cid=gcalClientId();
  document.getElementById('scheduleBody').innerHTML=`
    <div class="gcal-setup">
      ${msg?`<p style="color:var(--warn)">${msg}</p>`:''}
      <p>Google カレンダーを表示するにはOAuth クライアントID（ウェブアプリ用）を入力してください。</p>
      <div class="gcal-input-row">
        <input class="gcal-input" id="gcalClientInput" type="text"
          placeholder="xxxx.apps.googleusercontent.com" value="${cid}">
        <button class="gcal-save-btn" onclick="saveClientId()">保存</button>
      </div>
      <div class="gcal-id-hint">
        ※ <a href="https://console.cloud.google.com/apis/credentials" target="_blank"
           style="color:var(--accent)">Google Cloud Console</a> で作成した
        「ウェブアプリケーション」用のクライアントID<br>
        ※ 承認済みリダイレクトURIにこのページのURLを追加してください
      </div>
      ${cid?`<button class="gcal-signin-btn" onclick="gcalSignIn()">🔑 Google カレンダーに接続</button>`:''}
    </div>`;
}

function saveClientId(){
  const val=(document.getElementById('gcalClientInput')?.value||'').trim();
  if(!val){showSetupUI('クライアントIDを入力してください');return;}
  localStorage.setItem(GCAL_CLIENT_KEY,val);
  localStorage.removeItem(GCAL_TOKEN_KEY);
  localStorage.removeItem(GCAL_EXPIRY_KEY);
  document.getElementById('scheduleBody').innerHTML=`
    <div class="gcal-setup">
      <p style="color:var(--good)">✓ クライアントIDを保存しました</p>
      <button class="gcal-signin-btn" onclick="gcalSignIn()">🔑 Google カレンダーに接続</button>
    </div>`;
}

/* ── Fetch & render events ── */
async function gcalFetchAll(token, date){
  const start=new Date(date.getFullYear(),date.getMonth(),date.getDate(),0,0,0).toISOString();
  const end  =new Date(date.getFullYear(),date.getMonth(),date.getDate(),23,59,59).toISOString();

  const calR=await fetch(
    'https://www.googleapis.com/calendar/v3/users/me/calendarList?minAccessRole=reader',
    {headers:{Authorization:`Bearer ${token}`}}
  );
  if(!calR.ok) return null;
  const calData=await calR.json();
  const calendars=calData.items||[];
  calCalendarsCache=calendars;

  const all=[];
  await Promise.all(calendars.map(async cal=>{
    try{
      const evR=await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events`
        +`?timeMin=${encodeURIComponent(start)}&timeMax=${encodeURIComponent(end)}`
        +`&singleEvents=true&orderBy=startTime&maxResults=50`,
        {headers:{Authorization:`Bearer ${token}`}}
      );
      if(!evR.ok) return;
      const evD=await evR.json();
      for(const ev of (evD.items||[])){
        const isAllDay=!!ev.start?.date;
        const sdt=isAllDay?null:new Date(ev.start.dateTime);
        const edt=isAllDay?null:new Date(ev.end.dateTime);
        const title=ev.summary||'（タイトルなし）';
        const isFlight=/\bJ\d{1,4}\b|PAIRING|フライト|ペアリング/i.test(title+(cal.summary||''));
        all.push({
          calId:cal.id,
          sortKey:isAllDay?'0000':fmtTime(sdt),
          title, loc:ev.location||'', isAllDay, isFlight,
          startTime:isAllDay?'終日':fmtTime(sdt),
          endTime:isAllDay?'':fmtTime(edt),
          calColor:cal.backgroundColor||'#4a9eff',
        });
      }
    }catch(e){}
  }));
  all.sort((a,b)=>a.sortKey.localeCompare(b.sortKey));
  return {calendars, events:all};
}

function renderEvents(events){
  const el=document.getElementById('scheduleBody');
  if(!events||!events.length){
    el.innerHTML=`<div class="no-events">予定はありません ✈</div>`;
    return;
  }
  el.innerHTML=events.map(ev=>{
    const dotClass=ev.isFlight?'flight':ev.isAllDay?'allday':'';
    const badge=ev.isFlight?`<span class="event-badge flight">FLIGHT</span>`:'';
    const timeStr=ev.isAllDay?'終日':`${ev.startTime}–${ev.endTime}`;
    const loc=ev.loc?`<div class="event-location">📍 ${ev.loc}</div>`:'';
    return`<div class="event-row">
      <div class="event-time">${timeStr}</div>
      <div class="event-dot ${dotClass}" style="background:${ev.calColor}"></div>
      <div class="event-info"><div class="event-title">${ev.title}</div>${loc}</div>
      ${badge}</div>`;
  }).join('');
}

async function loadCalendar(){
  const el=document.getElementById('scheduleBody');
  const cid=gcalClientId();
  if(!cid){showSetupUI();return;}
  const token=gcalGetToken();
  if(!token){
    el.innerHTML=`<div class="gcal-setup">
      <p>Googleアカウントの認証が必要です</p>
      <button class="gcal-signin-btn" onclick="gcalSignIn()">🔑 Google カレンダーに接続</button>
      <div style="margin-top:8px;text-align:center">
        <span onclick="showSetupUI()" style="font-size:11px;color:var(--text-dim);cursor:pointer;text-decoration:underline">
          クライアントIDを変更する
        </span>
      </div>
    </div>`;
    return;
  }
  el.innerHTML=`<div class="loading-text"><span class="spinner"></span> 読込中…</div>`;
  try{
    const result=await gcalFetchAll(token, calDisplayDate);
    if(result===null){
      localStorage.removeItem(GCAL_TOKEN_KEY);
      el.innerHTML=`<div class="gcal-setup">
        <p style="color:var(--warn)">セッションが切れました</p>
        <button class="gcal-signin-btn" onclick="gcalSignIn()">🔑 再サインイン</button>
      </div>`;
      return;
    }
    calEventsCache=result.events;
    // 設定パネルが開いていれば更新
    if(document.getElementById('calSettingsPanel').classList.contains('open')){
      renderCalSettingsPanel(result.calendars);
    }
    const selectedIds=getSelectedCalIds();
    renderEvents(filterEvents(result.events, selectedIds));
    document.getElementById('calRefresh').textContent=fmtTime(new Date());
    const hasOutdoor=result.events.some(ev=>!ev.isAllDay&&!ev.isFlight&&ev.loc);
    if(hasOutdoor){renderTransport();document.getElementById('w-transport').style.display='';}
  }catch(e){
    el.innerHTML=`<div class="no-events">読み込みエラー</div>`;
    console.error(e);
  }
}

/* ══ WEATHER ══ */
const WMO_ICO={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'❄️',80:'🌦',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};
const WMO_TXT={0:'晴れ',1:'ほぼ晴れ',2:'薄曇り',3:'曇り',45:'霧',48:'霧',51:'小雨',53:'雨',55:'強雨',61:'小雨',63:'雨',65:'強雨',71:'小雪',73:'雪',75:'大雪',80:'にわか雨',81:'雨',82:'激しい雨',95:'雷雨',96:'雷雨',99:'激しい雷雨'};

async function loadWeather(){
  const {lat,lon,name}=currentLoc;
  try{
    const r=await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      +`&hourly=temperature_2m,precipitation_probability,weathercode`
      +`&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max,sunrise,sunset`
      +`&timezone=Asia%2FTokyo&forecast_days=7&past_days=1`
    );
    const d=await r.json();
    const hr=d.hourly, da=d.daily;
    const today=new Date();today.setHours(0,0,0,0);
    const dayIdx=Math.round((weatherDisplayDate-today)/86400000);
    const isToday=dayIdx===0;
    const targetDate=weatherDisplayDate.toISOString().slice(0,10);
    // その日の時間インデックスを抽出
    const hourIdxs=hr.time.map((t,i)=>t.startsWith(targetDate)?i:-1).filter(i=>i>=0);
    const curH=new Date().getHours();
    // ヘッダー更新（今日は現在時刻の値、他は最高気温）
    const hdrIdx=isToday?(hourIdxs[curH]??hourIdxs[0]):hourIdxs[12]??hourIdxs[0];
    const ct=isToday?Math.round(hr.temperature_2m[hdrIdx]):Math.round(da.temperature_2m_max[dayIdx]??hr.temperature_2m[hdrIdx]);
    const cw=hr.weathercode[hdrIdx];
    document.getElementById('headerTemp').textContent=`${ct}°`;
    document.getElementById('headerLoc').textContent=name;
    document.getElementById('headerDesc').textContent=`${WMO_ICO[cw]||''} ${WMO_TXT[cw]||''}`;
    // 時間スロット
    const startSlot=isToday?curH:0;
    const endSlot=isToday?Math.min(curH+12,24):24;
    let slots='';
    for(const i of hourIdxs.slice(startSlot,endSlot)){
      const prp=hr.precipitation_probability[i];
      const h=parseInt(hr.time[i].slice(11,13));
      slots+=`<div class="hour-slot">
        <div class="hour-label">${String(h).padStart(2,'0')}時</div>
        <div class="hour-icon">${WMO_ICO[hr.weathercode[i]]||'❓'}</div>
        <div class="hour-temp">${Math.round(hr.temperature_2m[i])}°</div>
        <div class="hour-rain">${prp>0?`💧${prp}%`:''}</div>
      </div>`;
    }
    document.getElementById('weatherHourly').innerHTML=slots||'<div style="padding:14px;font-size:12px;color:var(--text-sub)">データなし</div>';
    // サマリー（daily配列は past_days=1 で dayIdx+1 がオフセット）
    const di=da.time?da.time.findIndex(t=>t===targetDate):dayIdx+1;
    const maxT=Math.round(da.temperature_2m_max[di]??0), minT=Math.round(da.temperature_2m_min[di]??0);
    const rain=da.precipitation_probability_max[di]??0, wind=Math.round(da.windspeed_10m_max[di]??0);
    const sunR=(da.sunrise[di]||'').slice(11,16), sunS=(da.sunset[di]||'').slice(11,16);
    document.getElementById('weatherSummary').innerHTML=`
      <div class="weather-stat"><div class="weather-stat-label">最高</div><div class="weather-stat-val" style="color:var(--danger)">${maxT}°</div></div>
      <div class="weather-stat"><div class="weather-stat-label">最低</div><div class="weather-stat-val" style="color:var(--accent)">${minT}°</div></div>
      <div class="weather-stat"><div class="weather-stat-label">降水確率</div><div class="weather-stat-val">${rain}%</div></div>
      <div class="weather-stat"><div class="weather-stat-label">最大風速</div><div class="weather-stat-val">${wind}<span style="font-size:9px">km/h</span></div></div>
      <div class="weather-stat"><div class="weather-stat-label">日の出</div><div class="weather-stat-val" style="font-size:13px">${sunR}</div></div>
      <div class="weather-stat"><div class="weather-stat-label">日の入</div><div class="weather-stat-val" style="font-size:13px">${sunS}</div></div>`;
  }catch(e){
    document.getElementById('weatherHourly').innerHTML=
      `<div style="padding:14px;color:var(--text-sub);font-size:12px">天気を取得できませんでした</div>`;
  }
}

function getSelTrainLines(){
  try{const s=localStorage.getItem(TRAIN_LINES_KEY);if(s)return new Set(JSON.parse(s));}catch(e){}
  return new Set(['jrtokaido','jryokosuka','jrkeihin','keikyu','sotetsu','tokyu-t']);
}
function saveSelTrainLines(ids){localStorage.setItem(TRAIN_LINES_KEY,JSON.stringify([...ids]));}

function renderTrainSettings(){
  const sel=getSelTrainLines();
  document.getElementById('trainSettingsPanel').innerHTML=
    `<div class="train-line-grid">${TRAIN_LINES.map(l=>
      `<button class="train-line-chip${sel.has(l.id)?' selected':''}" onclick="toggleTrainLine('${l.id}',this)">${l.name}</button>`
    ).join('')}</div>`;
}
function toggleTrainSettings(){
  const p=document.getElementById('trainSettingsPanel');
  const b=document.getElementById('trainSettingsBtn');
  const open=p.classList.toggle('open');
  b.classList.toggle('active',open);
  if(open) renderTrainSettings();
}
function toggleTrainLine(id,btn){
  const sel=getSelTrainLines();
  if(sel.has(id)){sel.delete(id);btn.classList.remove('selected');}
  else{sel.add(id);btn.classList.add('selected');}
  saveSelTrainLines(sel);
  renderTrainBody(trainDelayCache);
}

let trainDelayCache=[];
async function loadTrainDelay(){
  try{
    const r=await fetch('https://rti-giken.jp/fhc/api/train_tetsudo/delay.json');
    trainDelayCache=await r.json();
    renderTrainBody(trainDelayCache);
    document.getElementById('trainRefresh').textContent=fmtTime(new Date());
  }catch(e){
    document.getElementById('trainBody').innerHTML=`<div class="no-events">取得エラー（通信を確認）</div>`;
  }
}
function renderTrainBody(delayed){
  const sel=getSelTrainLines();
  const lines=TRAIN_LINES.filter(l=>sel.has(l.id));
  const el=document.getElementById('trainBody');
  if(!lines.length){el.innerHTML=`<div class="no-events">路線を選択してください（☰）</div>`;return;}
  const delayNames=delayed.map(d=>d.name||'');
  el.innerHTML=lines.map(l=>{
    const isDelay=delayNames.some(n=>l.keys.some(k=>n.includes(k)));
    return`<div class="train-row">
      <div class="train-name">${l.name}</div>
      <div class="train-badge ${isDelay?'badge-delay':'badge-ok'}">${isDelay?'遅延あり':'平常運転'}</div>
    </div>`;
  }).join('');
}

function setYcatDest(dest){
  currentYcatDest=dest;
  localStorage.setItem('ycat_dest',dest);
  document.querySelectorAll('#ycatDestRow .loc-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(`ycatBtn-${dest}`);
  if(btn) btn.classList.add('active');
  renderYcatBus();
}
function renderYcatBus(){
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const schedule=YCAT_TBL[currentYcatDest];
  const info=YCAT_INFO[currentYcatDest];
  const el=document.getElementById('ycatBody');
  const upcoming=schedule.map(t=>{
    const[h,m]=t.split(':').map(Number);
    return{time:t,diff:h*60+m-nowMin};
  }).filter(x=>x.diff>=-2).slice(0,5);
  if(!upcoming.length){el.innerHTML=`<div class="no-events">本日の運行は終了しました</div>`;return;}
  el.innerHTML=upcoming.map((x,i)=>{
    const until=x.diff<=0?'出発済':x.diff<60?`あと${x.diff}分`:`あと${Math.floor(x.diff/60)}時間${x.diff%60}分`;
    return`<div class="bus-row">
      <div class="bus-time">${x.time}</div>
      <div style="flex:1;font-size:11px;color:var(--text-sub)">${info.sub}</div>
      <div class="bus-until">${until}</div>
      ${i===0?'<div class="bus-next-label">次発</div>':''}

const GMAPS_KEY_STORE='gmaps_api_key';
const TRAFFIC_CFG=[
  {
    from:'自宅（逗子）', to:'YCAT（横浜駅西口）',
    fromIcon:'🏠', toIcon:'🚌',
    origin:{lat:35.2942,lng:139.5779},
    dest:{lat:35.4663,lng:139.6197},
    mapsUrl:'https://www.google.com/maps/dir/?api=1&origin=35.2942,139.5779&destination=35.4663,139.6197&travelmode=driving',
  },
  {
    from:'YCAT（横浜駅西口）', to:'羽田空港',
    fromIcon:'🚌', toIcon:'✈️',
    origin:{lat:35.4663,lng:139.6197},
    dest:{lat:35.5494,lng:139.7798},
    mapsUrl:'https://www.google.com/maps/dir/?api=1&origin=35.4663,139.6197&destination=35.5494,139.7798&travelmode=driving',
  },
];

function getGMapsKey(){return localStorage.getItem(GMAPS_KEY_STORE)||'';}

let gmapsScriptLoaded=false;
function loadGMapsScript(apiKey){
  return new Promise((resolve,reject)=>{
    if(gmapsScriptLoaded&&window.google?.maps){resolve();return;}
    const existing=document.getElementById('gmaps-script');
    if(existing) existing.remove();
    const s=document.createElement('script');
    s.id='gmaps-script';
    s.src=`https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(apiKey)}&language=ja`;
    s.onload=()=>{gmapsScriptLoaded=true;resolve();};
    s.onerror=()=>reject(new Error('load_failed'));
    document.head.appendChild(s);
  });
}

async function fetchTrafficData(){
  const key=getGMapsKey();
  if(!key){showTrafficSetup();return;}
  const el=document.getElementById('trafficBody');
  el.innerHTML=`<div class="loading-text"><span class="spinner"></span> Googleマップから取得中…</div>`;
  try{
    await loadGMapsScript(key);
    const svc=new google.maps.DistanceMatrixService();
    const results=await Promise.all(TRAFFIC_CFG.map(r=>new Promise((resolve,reject)=>{
      svc.getDistanceMatrix({
        origins:[r.origin],
        destinations:[r.dest],
        travelMode:google.maps.TravelMode.DRIVING,
        drivingOptions:{departureTime:new Date(),trafficModel:google.maps.TrafficModel.BEST_GUESS},
        language:'ja',
      },(resp,status)=>{
        if(status==='OK') resolve(resp.rows[0].elements[0]);
        else reject(status);
      });
    })));
    renderTrafficTimes(results);
    document.getElementById('trafficRefresh').textContent=fmtTime(new Date());
  }catch(e){
    const msg=String(e);
    if(msg.includes('load_failed')||msg.includes('InvalidKey')||msg.includes('ApiNotActivated')){
      el.innerHTML=`<div class="gcal-setup">
        <p style="color:var(--warn)">⚠ APIキーが無効か、APIが未有効化です</p>
        <button class="gcal-signin-btn" onclick="showTrafficSetup()">APIキーを再設定</button>
      </div>`;
    }else{
      el.innerHTML=`<div class="no-events">取得エラー。時間をおいて再試行してください。</div>`;
    }
  }
}

function renderTrafficTimes(results){
  const el=document.getElementById('trafficBody');
  const now=new Date();
  const blocks=TRAFFIC_CFG.map((r,i)=>{
    const elem=results[i];
    const normalMin=Math.round((elem.duration?.value||0)/60);
    const currentMin=Math.round((elem.duration_in_traffic?.value||elem.duration?.value||0)/60);
    const diff=currentMin-normalMin;
    const diffSign=diff>0?'+':'';
    const diffColor=diff>15?'var(--danger)':diff>5?'var(--warn)':'var(--good)';
    const icon=diff>15?'🔴':diff>5?'🟡':'🟢';
    return`<div class="traffic-time-block">
      <div class="traffic-route-label">
        ${r.fromIcon} <strong>${r.from}</strong>
        <span style="color:var(--text-dim)">→</span>
        ${r.toIcon} <strong>${r.to}</strong>
      </div>
      <div class="traffic-cells">
        <div class="traffic-cell">
          <div class="traffic-cell-label">通常</div>
          <div class="traffic-cell-val">${normalMin}<span class="traffic-cell-unit">分</span></div>
        </div>
        <div class="traffic-cell">
          <div class="traffic-cell-label">現在</div>
          <div class="traffic-cell-val">${currentMin}<span class="traffic-cell-unit">分</span></div>
        </div>
        <div class="traffic-cell" style="border:1px solid ${diffColor}44">
          <div class="traffic-cell-label">差</div>
          <div class="traffic-cell-val" style="color:${diffColor}">${diffSign}${diff}<span class="traffic-cell-unit">分</span></div>
        </div>
        <div class="traffic-status-icon">${icon}</div>
      </div>
      <a class="traffic-maps-btn" href="${r.mapsUrl}" target="_blank">Googleマップで詳細確認 →</a>
    </div>`;
  }).join('<div style="height:1px;background:var(--border);margin:0 15px"></div>');
  el.innerHTML=blocks+`<div class="traffic-footer">Googleマップ リアルタイム交通情報 — ${fmtTime(now)} 更新</div>`;
}

function showTrafficSetup(){
  const key=getGMapsKey();
  document.getElementById('trafficBody').innerHTML=`
    <div class="gcal-setup">
      <p>Google Maps APIキーを入力してください。<br>
      <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:var(--accent)">Google Cloud Console</a> で取得し、<b>Maps JavaScript API</b> と <b>Distance Matrix API</b> を有効化してください。</p>
      <div class="gcal-input-row">
        <input class="gcal-input" id="gmapsKeyInput" type="text" placeholder="AIzaSy..." value="${key}">
        <button class="gcal-save-btn" onclick="saveGMapsKeyAndLoad()">保存</button>
      </div>
      <div class="gcal-id-hint">※ APIキーはこのブラウザにのみ保存されます<br>※ 個人利用なら無料枠（月$200クレジット）で十分です</div>
    </div>`;
}

function saveGMapsKeyAndLoad(){
  const val=(document.getElementById('gmapsKeyInput')?.value||'').trim();
  if(!val) return;
  localStorage.setItem(GMAPS_KEY_STORE,val);
  gmapsScriptLoaded=false;
  fetchTrafficData();
}

/* ══ RADAR — RainViewer ══ */
const MAP_STYLES=[
  {label:'🗺 地図',  url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', sub:'abcd', attr:'&copy; CARTO &copy; OSM'},
  {label:'🛰 衛星',  url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', sub:'', attr:'Esri World Imagery'},
  {label:'🌑 ダーク',url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', sub:'abcd', attr:'&copy; CARTO &copy; OSM'},
  {label:'🏔 地形',  url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', sub:'abc', attr:'&copy; OpenTopoMap (CC-BY-SA)'},
];
let currentMapStyle=parseInt(localStorage.getItem('map_style')||'0');
let currentLayerType=(()=>{const t=localStorage.getItem('layer_type');return['radar','ir','visible'].includes(t)?t:'radar';})();
let radarMap=null, baseTileLayer=null, radarLayer=null, satLayer=null;

function setMapStyle(idx){
  currentMapStyle=idx;
  localStorage.setItem('map_style',String(idx));
  document.querySelectorAll('.map-style-btn:not(.lyr-btn)').forEach((b,i)=>b.classList.toggle('active',i===idx));
  if(!radarMap) return;
  if(baseTileLayer) radarMap.removeLayer(baseTileLayer);
  const s=MAP_STYLES[idx];
  const opts={attribution:s.attr,maxZoom:12};
  if(s.sub) opts.subdomains=s.sub;
  baseTileLayer=L.tileLayer(s.url,opts).addTo(radarMap);
  if(radarLayer){radarMap.removeLayer(radarLayer);radarMap.addLayer(radarLayer);}
  if(satLayer){radarMap.removeLayer(satLayer);radarMap.addLayer(satLayer);}
}

function setLayerType(type){
  currentLayerType=type;
  localStorage.setItem('layer_type',type);
  const types=['radar','ir','visible'];
  document.querySelectorAll('.lyr-btn').forEach((b,i)=>b.classList.toggle('active',types[i]===type));
  const legend=document.querySelector('.radar-legend');
  if(legend) legend.style.display=type==='radar'?'':'none';
  if(!radarMap) return;
  loadOverlay();
}

function toggleRadarFullscreen(){
  const widget=document.getElementById('w-radar');
  const isFS=widget.classList.toggle('widget-fullscreen');
  document.body.style.overflow=isFS?'hidden':'';
  setTimeout(()=>{if(radarMap) radarMap.invalidateSize();},150);
  if(isFS){
    const onKey=e=>{
      if(e.key==='Escape'){
        widget.classList.remove('widget-fullscreen');
        document.body.style.overflow='';
        if(radarMap) setTimeout(()=>radarMap.invalidateSize(),100);
        document.removeEventListener('keydown',onKey);
      }
    };
    document.addEventListener('keydown',onKey);
  }
}

// NASA GIBS タイル時刻計算（遅延分を引いて10分刻みに切り捨て）
function gibsTime(delayMin){
  const t=new Date(Date.now()-delayMin*60000);
  t.setUTCMinutes(Math.floor(t.getUTCMinutes()/10)*10,0,0);
  return t.toISOString().replace('.000Z','Z');
}

async function loadOverlay(){
  if(radarLayer){radarMap.removeLayer(radarLayer);radarLayer=null;}
  if(satLayer){radarMap.removeLayer(satLayer);satLayer=null;}
  const pill=document.getElementById('radarTimePill');
  pill.textContent='読込中…';
  try{
    if(currentLayerType==='radar'){
      const resp=await fetch('https://api.rainviewer.com/public/weather-maps.json');
      const data=await resp.json();
      const frames=data.radar.past;
      if(!frames||!frames.length) throw new Error('no radar frames');
      const latest=frames[frames.length-1];
      const dt=new Date(latest.time*1000);
      const hh=String(dt.getHours()).padStart(2,'0'), mm=String(dt.getMinutes()).padStart(2,'0');
      pill.textContent=`🌧 ${hh}:${mm}`;
      radarLayer=L.tileLayer(`${data.host}${latest.path}/256/{z}/{x}/{y}/6/1_1.png`,
        {opacity:0.6,maxZoom:12,attribution:'RainViewer'}).addTo(radarMap);

    } else if(currentLayerType==='ir'){
      // NASA GIBS — Himawari赤外（10分毎、約60分遅延）
      const time=gibsTime(70);
      const dt=new Date(Date.now()-70*60000);
      const hh=String(dt.getHours()).padStart(2,'0'), mm=String(dt.getMinutes()).padStart(2,'0');
      pill.textContent=`☁ ${hh}:${mm} (Himawari IR)`;
      satLayer=L.tileLayer(
        `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/Himawari_AHI_Band13_Clean_Infrared/default/${time}/GoogleMapsCompatible_Level6/{z}/{y}/{x}.jpg`,
        {opacity:0.85,maxZoom:6,attribution:'NASA GIBS / Himawari-9'}).addTo(radarMap);

    } else if(currentLayerType==='visible'){
      // NASA GIBS — VIIRS可視光（日次、前日更新）
      const yesterday=new Date(Date.now()-86400000);
      const dateStr=yesterday.toISOString().slice(0,10);
      pill.textContent=`🌍 ${dateStr} (VIIRS)`;
      satLayer=L.tileLayer(
        `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_SNPP_CorrectedReflectance_TrueColor/default/${dateStr}/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg`,
        {opacity:1,maxZoom:9,attribution:'NASA GIBS / VIIRS'}).addTo(radarMap);
    }
  }catch(e){
    pill.textContent='取得失敗';
    console.error('Overlay error:',e);
  }
}

async function loadRadar(){
  if(!radarMap){
    radarMap=L.map('radarMap',{center:[36.2,138.0],zoom:6,zoomControl:true});
    const s=MAP_STYLES[currentMapStyle];

/* ══ CARD RESIZE ══ */
function initCardResize(){
  const SIZES_KEY='card_sizes_v1';
  const saved=JSON.parse(localStorage.getItem(SIZES_KEY)||'{}');

  document.querySelectorAll('.widget').forEach(widget=>{
    const id=widget.id;
    if(saved[id]) widget.style.minHeight=saved[id]+'px';

    const handle=document.createElement('div');
    handle.className='card-resize-handle';
    handle.title='ドラッグで高さ変更';
    widget.appendChild(handle);

    let isResizing=false,startY=0,startH=0;

    function onStart(clientY){
      isResizing=true;startY=clientY;
      startH=widget.getBoundingClientRect().height;
      handle.classList.add('resizing');
      document.body.style.cursor='s-resize';
      document.body.style.userSelect='none';
      document.body.style.webkitUserSelect='none';
    }
    function onMove(clientY){
      if(!isResizing) return;
      const newH=Math.max(80,startH+(clientY-startY));
      widget.style.minHeight=newH+'px';
      if(radarMap&&id==='w-radar') radarMap.invalidateSize();
    }
    function onEnd(){
      if(!isResizing) return;
      isResizing=false;
      handle.classList.remove('resizing');
      document.body.style.cursor='';
      document.body.style.userSelect='';
      document.body.style.webkitUserSelect='';
      const sizes=JSON.parse(localStorage.getItem(SIZES_KEY)||'{}');
      sizes[id]=Math.round(widget.getBoundingClientRect().height);
      localStorage.setItem(SIZES_KEY,JSON.stringify(sizes));
      if(radarMap&&id==='w-radar') setTimeout(()=>radarMap.invalidateSize(),60);
    }

    handle.addEventListener('mousedown',e=>{onStart(e.clientY);e.preventDefault();e.stopPropagation();});
    document.addEventListener('mousemove',e=>onMove(e.clientY));
    document.addEventListener('mouseup',onEnd);
    handle.addEventListener('touchstart',e=>{onStart(e.touches[0].clientY);e.stopPropagation();},{passive:true});
    handle.addEventListener('touchmove',e=>{onMove(e.touches[0].clientY);e.preventDefault();},{passive:false});
    handle.addEventListener('touchend',onEnd);

    /* ── 横リサイズハンドル（個別カード幅） ── */
    {
      const hHandle=document.createElement('div');
      hHandle.className='card-resize-h right';
      hHandle.title='ドラッグで幅変更';
      widget.appendChild(hHandle);
      const cRoot=document.getElementById('columnsRoot');
      let hResizing=false,hStartX=0,hStartW=0,hCW=0;

      function hSetWidth(clientX){
        const newW=Math.max(hCW*0.2,hStartW+(clientX-hStartX));
        const pct=Math.min(100,newW/hCW*100);
        widget.style.flex=`0 0 ${pct>=99?'100%':'calc('+pct.toFixed(1)+'% - 6px)'}`;
        if(radarMap&&widget.id==='w-radar') radarMap.invalidateSize();
      }
      function hSave(){
        const pct=parseFloat((widget.getBoundingClientRect().width/cRoot.getBoundingClientRect().width*100).toFixed(1));
        const widths=JSON.parse(localStorage.getItem('card_widths_v1')||'{}');
        widths[widget.id]=pct;localStorage.setItem('card_widths_v1',JSON.stringify(widths));
        if(radarMap&&widget.id==='w-radar') setTimeout(()=>radarMap.invalidateSize(),60);
      }

      hHandle.addEventListener('mousedown',e=>{
        hResizing=true;hStartX=e.clientX;
        hStartW=widget.getBoundingClientRect().width;
        hCW=cRoot.getBoundingClientRect().width;
        hHandle.classList.add('resizing');
        document.body.style.cursor='ew-resize';document.body.style.userSelect='none';
        e.preventDefault();e.stopPropagation();
      });
      document.addEventListener('mousemove',e=>{if(hResizing) hSetWidth(e.clientX);});
      document.addEventListener('mouseup',()=>{
        if(!hResizing) return;
        hResizing=false;hHandle.classList.remove('resizing');
        document.body.style.cursor='';document.body.style.userSelect='';hSave();
      });
      hHandle.addEventListener('touchstart',e=>{
        hResizing=true;hStartX=e.touches[0].clientX;
        hStartW=widget.getBoundingClientRect().width;
        hCW=cRoot.getBoundingClientRect().width;
        hHandle.classList.add('resizing');e.stopPropagation();
      },{passive:true});
      hHandle.addEventListener('touchmove',e=>{
        if(hResizing){hSetWidth(e.touches[0].clientX);e.preventDefault();}
      },{passive:false});
      hHandle.addEventListener('touchend',()=>{if(hResizing){hResizing=false;hHandle.classList.remove('resizing');hSave();}});
    }
  });
}

/* ══════════════════════════════════════
   DRAG & DROP（デスクトップ + iOS）
══════════════════════════════════════ */
let dragW=null;

function initDragDrop(){
  const root=document.getElementById('columnsRoot');

  root.addEventListener('dragstart',e=>{
    if(e.target.closest('button,input,a,select,label')) return;
    if(e.target.closest('.leaflet-container,.card-resize-handle,.card-resize-h')) return;
    const w=e.target.closest('.widget');
    if(!w) return;
    dragW=w;
    setTimeout(()=>w.classList.add('dragging'),0);
    e.dataTransfer.effectAllowed='move';
  });
  root.addEventListener('dragend',()=>{
    if(dragW) dragW.classList.remove('dragging');
    clearDragOver(); dragW=null;
  });
  root.addEventListener('dragover',e=>{
    e.preventDefault();
    const w=e.target.closest('.widget');
    if(!w||w===dragW) return;
    clearDragOver();
    const rect=w.getBoundingClientRect();
    if(e.clientX<rect.left+rect.width/2) w.classList.add('drag-over-left');
    else w.classList.add('drag-over-right');
  });
  root.addEventListener('dragleave',e=>{
    if(!e.relatedTarget||!e.relatedTarget.closest('.widget')) clearDragOver();
  });
  root.addEventListener('drop',e=>{
    e.preventDefault();
    if(!dragW){clearDragOver();return;}
    const target=e.target.closest('.widget');
    if(target&&target!==dragW){
      const rect=target.getBoundingClientRect();
      const before=e.clientX<rect.left+rect.width/2;
      if(before) root.insertBefore(dragW,target);
      else root.insertBefore(dragW,target.nextSibling);
    } else if(!target){
      root.appendChild(dragW);
    } else {
      clearDragOver(); return;
    }
    clearDragOver(); saveLayout();
    if(radarMap) setTimeout(()=>radarMap.invalidateSize(),60);
  });

  function clearDragOver(){
    document.querySelectorAll('.widget').forEach(n=>{
      n.classList.remove('drag-over-left','drag-over-right');
    });
  }

  /* iOS Touch */
  let tSrc=null,tClone=null,tStartX=0,tStartY=0,tTimer=null;

  root.addEventListener('touchstart',e=>{
    if(e.target.closest('button,input,a,select,label,.card-resize-handle,.card-resize-h')) return;
    const h=e.target.closest('.card-header');
    const w=h&&h.closest('.widget');
    if(!w) return;
    tStartX=e.touches[0].clientX; tStartY=e.touches[0].clientY; tSrc=w;
    tTimer=setTimeout(()=>{
      if(!tSrc) return;
      const r=w.getBoundingClientRect();
      tClone=w.cloneNode(true);
      Object.assign(tClone.style,{
        position:'fixed',left:`${r.left}px`,top:`${r.top}px`,
        width:`${r.width}px`,opacity:'0.85',pointerEvents:'none',
        zIndex:'9999',borderRadius:'14px',
        boxShadow:'0 8px 30px rgba(0,0,0,0.5)',transition:'none'
      });
      document.body.appendChild(tClone);
      w.style.opacity='0.25';
    },250);
  },{passive:true});

  root.addEventListener('touchmove',e=>{
    if(!tSrc||!tClone) return;
    e.preventDefault();
    const t=e.touches[0];
    const dx=t.clientX-tStartX, dy=t.clientY-tStartY;
    const r=tSrc.getBoundingClientRect();
    tClone.style.left=`${r.left+dx}px`;
    tClone.style.top=`${r.top+dy}px`;
    tClone.style.display='none';
    const el=document.elementFromPoint(t.clientX,t.clientY);
    tClone.style.display='';
    const over=el&&el.closest('.widget');
    document.querySelectorAll('.widget').forEach(n=>n.classList.remove('drag-over-left','drag-over-right'));
    if(over&&over!==tSrc){
      const rect=over.getBoundingClientRect();
      if(t.clientX<rect.left+rect.width/2) over.classList.add('drag-over-left');
      else over.classList.add('drag-over-right');
    }
  },{passive:false});

  root.addEventListener('touchend',e=>{
    clearTimeout(tTimer);
    if(!tSrc){tSrc=null;return;}
    if(tClone){
      const t=e.changedTouches[0];
      tClone.style.display='none';
      const el=document.elementFromPoint(t.clientX,t.clientY);
      tClone.style.display='';
      const target=el&&el.closest('.widget');
      if(target&&target!==tSrc){
        const rect=target.getBoundingClientRect();
        const before=t.clientX<rect.left+rect.width/2;
        if(before) root.insertBefore(tSrc,target);
        else root.insertBefore(tSrc,target.nextSibling);
        saveLayout();
        if(radarMap) setTimeout(()=>radarMap.invalidateSize(),60);
      }
      tSrc.style.opacity='';
      tClone.remove(); tClone=null;
      document.querySelectorAll('.widget').forEach(n=>n.classList.remove('drag-over-left','drag-over-right'));
    }
    tSrc=null;
  });
}

/* ── レイアウト保存/復元 ── */
const LAYOUT_KEY='dashboard_layout_v4';
function saveLayout(){
  const root=document.getElementById('columnsRoot');
  const layout=[];
  root.querySelectorAll(':scope > .widget').forEach(w=>{
    layout.push({id:w.id,hidden:w.style.display==='none',flex:w.style.flex||''});
  });
  localStorage.setItem(LAYOUT_KEY,JSON.stringify(layout));
}
function restoreLayout(){
  const root=document.getElementById('columnsRoot');
  // カード個別幅を復元
  const widths=JSON.parse(localStorage.getItem('card_widths_v1')||'{}');
  Object.entries(widths).forEach(([id,pct])=>{
    const el=document.getElementById(id);
    if(el) el.style.flex=`0 0 ${pct>=99?'100%':'calc('+parseFloat(pct).toFixed(1)+'% - 6px)'}`;
  });
  const saved=localStorage.getItem(LAYOUT_KEY);
  if(!saved) return;
  try{
    const layout=JSON.parse(saved);
    layout.forEach(({id,hidden,flex})=>{
      const el=document.getElementById(id);
      if(!el) return;
      root.appendChild(el);
      if(!hidden) el.style.display='';
      if(flex&&!widths[id]) el.style.flex=flex;
    });
  }catch(e){}
}
